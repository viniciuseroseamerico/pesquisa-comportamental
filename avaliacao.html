<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação - Perfil Comportamental</title>
    <style>
        body { font-family: system-ui; padding: 20px; max-width: 700px; margin: auto; }
        .pergunta { margin-bottom: 24px; padding: 20px; background: #f8fafc; border-radius: 16px; }
        label { display: block; margin: 8px 0; }
        button { background: #0F172A; color: white; border: none; padding: 12px 24px; border-radius: 40px; cursor: pointer; width: 100%; margin-top: 20px; }
        .erro { color: red; background: #fee; padding: 12px; border-radius: 12px; margin: 20px 0; }
        .info { background: #e6f7e6; padding: 12px; border-radius: 12px; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>🎯 Avaliação de Perfil</h1>
    <div id="status">Carregando...</div>
    <div id="perguntas"></div>
    <div id="erro" style="color:red;"></div>

    <script>
        // Teste 1: Verificar se o script está rodando
        document.getElementById("status").innerHTML = "✅ Script carregado. Buscando perguntas...";
        
        // Teste 2: Tentar carregar o JSON
        fetch("dados/perguntas.json")
            .then(res => {
                if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                return res.json();
            })
            .then(perguntas => {
                document.getElementById("status").innerHTML = `✅ Carregado! ${perguntas.length} perguntas encontradas.`;
                
                const container = document.getElementById("perguntas");
                perguntas.forEach((p, i) => {
                    container.innerHTML += `
                        <div class="pergunta">
                            <p><strong>${i+1}. ${p.pergunta}</strong></p>
                            ${p.opcoes.map(op => `<label><input type="radio" name="q${i}" value="${op.tipo}"> ${op.texto}</label>`).join("")}
                        </div>
                    `;
                });
                
                // Adicionar botão finalizar
                const btn = document.createElement("button");
                btn.textContent = "Finalizar avaliação";
                btn.onclick = () => alert("Quiz finalizado! (versão de teste)");
                container.appendChild(btn);
            })
            .catch(err => {
                document.getElementById("status").innerHTML = "❌ ERRO AO CARREGAR";
                document.getElementById("erro").innerHTML = `Erro: ${err.message}<br><br>Verifique se o arquivo está em:<br>https://viniciuseroseamerico.github.io/pesquisa-comportamental/dados/perguntas.json`;
            });
    </script>
</body>
</html>
