<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Perfil Comportamental</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .logo { width: 64px; height: 64px; background: linear-gradient(135deg, #3B82F6, #8B5CF6); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 32px; }
        h1 { font-size: 28px; text-align: center; margin-bottom: 8px; }
        p { text-align: center; color: #64748B; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 500; margin-bottom: 8px; }
        input { width: 100%; padding: 12px 16px; border: 2px solid #E2E8F0; border-radius: 16px; font-size: 15px; }
        button { width: 100%; padding: 14px; background: #0F172A; color: white; border: none; border-radius: 40px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        button:hover { transform: translateY(-2px); background: #1E293B; }
        .btn-demo { background: #8B5CF6; margin-top: 15px; }
        .btn-demo:hover { background: #7C3AED; }
        .erro { color: #EF4444; text-align: center; margin-top: 16px; display: none; }
        .link-esqueci { text-align: center; margin-top: 20px; }
        .link-esqueci a { color: #64748B; font-size: 14px; text-decoration: none; }
        .link-esqueci a:hover { text-decoration: underline; }
        .divider { display: flex; align-items: center; margin: 20px 0; color: #94A3B8; font-size: 12px; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #E2E8F0; }
        .divider::before { margin-right: 10px; }
        .divider::after { margin-left: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎯</div>
        <h1>Perfil Comportamental</h1>
        <p>Gestão de pessoas com inteligência</p>

        <form id="loginForm">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="gestor@empresa.com.br" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="••••••" required>
            </div>
            <button type="submit">Acessar plataforma →</button>
            <div id="erroMsg" class="erro"></div>
        </form>

        <div class="divider">ou</div>

        <button id="btnDemo" class="btn-demo">🎬 Testar Demonstração</button>

        <div class="link-esqueci">
            <a href="#" id="btnEsqueciSenha">Esqueci minha senha</a>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://afoirnevaxsmdsjqijdx.supabase.co";
        const supabaseKey = "sb_publishable_bw3-Nmv8Js7itGSg6k4btw_wY7wE960";
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        // Conta DEMO - vai ser criada automaticamente se não existir
        const DEMO_EMAIL = "demo@empresa.com";
        const DEMO_SENHA = "demo123";
        const DEMO_NOME = "Usuário Demo";
        const DEMO_EMPRESA = "Empresa Demonstração";

        async function criarContaDemo() {
            // Verificar se já existe
            const { data: existente } = await supabaseClient
                .from('gestores')
                .select('id')
                .eq('email', DEMO_EMAIL);
            
            if (existente && existente.length > 0) {
                console.log("Conta demo já existe");
                return;
            }
            
            // Criar conta demo
            const { error } = await supabaseClient
                .from('gestores')
                .insert({
                    email: DEMO_EMAIL,
                    senha: DEMO_SENHA,
                    nome: DEMO_NOME,
                    empresa: DEMO_EMPRESA,
                    plano: 'pro',
                    data_expiracao: '2026-12-31 23:59:59',
                    ativo: true
                });
            
            if (error) {
                console.error("Erro ao criar conta demo:", error);
            } else {
                console.log("Conta demo criada com sucesso!");
            }
        }

        async function fazerLogin(email, senha) {
            const { data, error } = await supabaseClient
                .from('gestores')
                .select('*')
                .eq('email', email)
                .eq('senha', senha)
                .eq('ativo', true);

            if (error || !data || data.length === 0) {
                return false;
            }

            const gestor = data[0];
            localStorage.setItem("gestorLogado", JSON.stringify({
                id: gestor.id,
                nome: gestor.nome,
                empresa: gestor.empresa,
                email: gestor.email,
                dataExpiracao: gestor.data_expiracao
            }));
            return true;
        }

        document.getElementById("loginForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;
            const erroMsg = document.getElementById("erroMsg");
            erroMsg.style.display = "none";

            const sucesso = await fazerLogin(email, senha);
            
            if (sucesso) {
                window.location.href = "dashboard.html";
            } else {
                erroMsg.textContent = "❌ E-mail ou senha inválidos";
                erroMsg.style.display = "block";
            }
        });

        // Botão Demo
        document.getElementById("btnDemo").addEventListener("click", async function() {
            const erroMsg = document.getElementById("erroMsg");
            erroMsg.style.display = "none";
            
            // Criar conta demo se não existir
            await criarContaDemo();
            
            // Fazer login com a conta demo
            const sucesso = await fazerLogin(DEMO_EMAIL, DEMO_SENHA);
            
            if (sucesso) {
                window.location.href = "dashboard.html";
            } else {
                erroMsg.textContent = "❌ Erro ao acessar demonstração. Tente novamente.";
                erroMsg.style.display = "block";
            }
        });

        // Esqueci minha senha
        document.getElementById("btnEsqueciSenha").addEventListener("click", async function() {
            const email = prompt("Digite seu e-mail cadastrado para receber uma nova senha:");
            if (!email) return;
            
            const { data } = await supabaseClient.from('gestores').select('*').eq('email', email);
            if (!data || data.length === 0) {
                alert("❌ E-mail não encontrado. Entre em contato com o administrador.");
                return;
            }
            
            const novaSenha = Math.random().toString(36).substr(2, 8);
            const { error } = await supabaseClient.from('gestores').update({ senha: novaSenha }).eq('email', email);
            
            if (error) {
                alert("❌ Erro ao gerar nova senha. Tente novamente.");
            } else {
                alert(`✅ Nova senha gerada: ${novaSenha}\n\nAnote esta senha e use para fazer login.`);
            }
        });
    </script>
</body>
</html>
