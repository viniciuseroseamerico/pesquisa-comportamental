<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Perfil Comportamental</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .logo { width: 64px; height: 64px; background: linear-gradient(135deg, #3B82F6, #8B5CF6); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 32px; }
        h1 { font-size: 28px; text-align: center; margin-bottom: 8px; }
        p { text-align: center; color: #64748B; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 500; margin-bottom: 8px; }
        input { width: 100%; padding: 12px 16px; border: 2px solid #E2E8F0; border-radius: 16px; font-size: 15px; }
        button { width: 100%; padding: 14px; background: #0F172A; color: white; border: none; border-radius: 40px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .erro { color: #EF4444; text-align: center; margin-top: 16px; display: none; }
        .link-esqueci { text-align: center; margin-top: 20px; }
        .link-esqueci a { color: #64748B; font-size: 14px; text-decoration: none; }
        .link-esqueci a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎯</div>
        <h1>Perfil Comportamental</h1>
        <p>Gestão de pessoas com inteligência</p>

        <form id="loginForm">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="gestor@empresa.com.br" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="••••••" required>
            </div>
            <button type="submit">Acessar plataforma →</button>
            <div id="erroMsg" class="erro"></div>
        </form>

        <div class="link-esqueci">
            <a href="#" id="btnEsqueciSenha">Esqueci minha senha</a>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://afoirnevaxsmdsjqijdx.supabase.co";
        const supabaseKey = "sb_publishable_bw3-Nmv8Js7itGSg6k4btw_wY7wE960";
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById("loginForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;
            const erroMsg = document.getElementById("erroMsg");
            erroMsg.style.display = "none";

            const { data, error } = await supabaseClient
                .from('gestores')
                .select('*')
                .eq('email', email)
                .eq('senha', senha)
                .eq('ativo', true);

            if (error || !data || data.length === 0) {
                erroMsg.textContent = "❌ E-mail ou senha inválidos";
                erroMsg.style.display = "block";
                return;
            }

            const gestor = data[0];
            localStorage.setItem("gestorLogado", JSON.stringify({
                id: gestor.id,
                nome: gestor.nome,
                empresa: gestor.empresa,
                email: gestor.email,
                dataExpiracao: gestor.data_expiracao
            }));

            window.location.href = "dashboard.html";
        });

        // Esqueci minha senha
        document.getElementById("btnEsqueciSenha").addEventListener("click", async function() {
            const email = prompt("Digite seu e-mail cadastrado para receber uma nova senha:");
            if (!email) return;
            
            const { data } = await supabaseClient.from('gestores').select('*').eq('email', email);
            if (!data || data.length === 0) {
                alert("❌ E-mail não encontrado. Entre em contato com o administrador.");
                return;
            }
            
            const novaSenha = Math.random().toString(36).substr(2, 8);
            const { error } = await supabaseClient.from('gestores').update({ senha: novaSenha }).eq('email', email);
            
            if (error) {
                alert("❌ Erro ao gerar nova senha. Tente novamente.");
            } else {
                alert(`✅ Nova senha gerada: ${novaSenha}\n\nAnote esta senha e use para fazer login.`);
            }
        });
    </script>
</body>
</html>
